<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narcisa Guran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --padding-x: clamp(24px, 8vw, 160px);
      --avatar-size: clamp(80px, 15vw, 180px);
      --h1-size: clamp(1.6rem, 4.5vw, 3.8rem);
      --bio-size: clamp(1rem, 2vw, 1.6rem);
      --btn-size: clamp(0.85rem, 1.5vw, 1.35rem);
      --btn-padding-y: clamp(10px, 1.5vw, 18px);
      --btn-padding-x: clamp(18px, 3vw, 36px);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(40px, 8vh, 80px) var(--padding-x);
    }

    .container {
      max-width: 700px;
      width: 100%;
    }

    .avatar {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: clamp(16px, 2.5vw, 28px);
      background: #e8e4de;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 3.5vw, 38px);
      color: #999;
      letter-spacing: -1px;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: var(--h1-size);
      font-weight: 400;
      line-height: 1.35;
      color: #1a1a1a;
      margin-bottom: clamp(10px, 2vw, 18px);
    }

    h1 strong {
      font-weight: 600;
    }

    .bio {
      font-size: var(--bio-size);
      line-height: 1.7;
      color: #555;
      margin-bottom: clamp(20px, 4vw, 36px);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(6px, 1vw, 10px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: clamp(6px, 1vw, 11px);
      padding: var(--btn-padding-y) var(--btn-padding-x);
      border-radius: 999px;
      font-size: var(--btn-size);
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      cursor: pointer;
      border: none;
      white-space: nowrap;
    }

    .btn:hover {
      opacity: 0.82;
      transform: translateY(-1px);
    }

    .btn-github   { background: #e0e7f5; color: #2a4a8c; }
    .btn-linkedin { background: #daeef5; color: #1a5f7a; }
    .btn-twitter  { background: #e8e4f5; color: #4a3080; }
    .btn-email    { background: #fde8e8; color: #8c2a2a; }
    .btn-scholar  { background: #e6f5e4; color: #2a6c2a; }

    .btn svg {
      width: clamp(14px, 2vw, 22px);
      height: clamp(14px, 2vw, 22px);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="avatar">
      <span>NG</span>
    </div>

    <h1>Hi, I'm <strong>Narcisa Guran</strong>.<br>Researcher. Engineer.</h1>

    <p class="bio">
      I am a PhD candidate at Leibniz University of Hannover, advised by Prof. Dr. Jan S. Rellermeyer, working at the intersection of machine learning, information retrieval, and systems.
    </p>

</html>
